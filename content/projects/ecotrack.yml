title: StockSense — Predictive Inventory Dashboard
description: Built a Django REST API and Nuxt dashboard that integrates an ML model to forecast stockouts up to 14 days in advance. Reduced client stockouts by 28% in the first quarter after launch. Deployed on GCP with GitHub Actions CI/CD.
