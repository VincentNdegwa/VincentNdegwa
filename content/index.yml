faq:
  title: Frequently Asked Questions
  description: Insights into my engineering process, technical philosophy, and collaboration models.
  categories:
    - title: Engineering & Expertise
      questions:
        - label: What is your primary area of expertise?
          content: |
            I am a Full-Stack Software Engineer specializing in high-performance enterprise systems (ERP/POS) and Applied AI. I bridge the gap between robust backend architecture (Laravel/Django) and intelligent automation (LLMs/RAG). My goal is to transform complex business logic into scalable, AI-enhanced software.
        - label: Can you lead the integration of AI into existing platforms?
          content: |
            Yes. Beyond standard web development, I specialize in "AI Retrofitting." This involves building RAG (Retrieval-Augmented Generation) pipelines, fine-tuning models for specific business datasets, and creating Python-based microservices that interface seamlessly with Laravel or Node.js backends.
        - label: Are you comfortable with legacy code and refactoring?
          content: |
            Absolutely. I have extensive experience jumping into established codebases to identify bottlenecks, optimize database queries, and implement modern design patterns. I prioritize "stability-first" refactoring, ensuring that performance improves without disrupting current production workflows.
    - title: Collaboration & Process
      questions:
        - label: How do you approach a new project or role?
          content: |
            I follow a "Discovery-First" approach. I start by auditing the current technical debt, infrastructure, and business requirements. For engineering roles, I focus on CI/CD maturity, test coverage (Pest/Cypress), and system scalability to ensure the team can ship high-quality code at speed.
        - label: What is your preferred engagement model?
          content: |
            I am primarily looking for high-impact Full-Stack or AI Engineering roles within forward-thinking organizations. I am also open to selective, long-term strategic consulting where architectural oversight and AI implementation are required. 
        - label: How do you handle project timelines and delivery?
          content: |
            I work with milestone-based delivery. By breaking down complex features into iterative sprints, I ensure stakeholders have full visibility. I utilize Docker for environment parity and automated pipelines to ensure that "ready" means "production-grade."
        - label: Do you provide technical leadership or mentorship?
          content: |
            Yes. Having worked across cross-functional teams, I value clean code practices, detailed documentation, and peer code reviews. I believe a Senior Engineer’s success is measured by the growth and velocity of the entire engineering team.
    - title: Background & Research
      questions:
        - label: How does your MSc in AI influence your engineering work?
          content: |
            My research at the Open University of Kenya focuses on Applied ML and Intelligent Automation. This allows me to move beyond using AI as a "black box" and instead architect custom solutions—like sentiment-based routing or predictive inventory engines—that are grounded in mathematical theory and data science best practices.
        - label: What tools are currently in your "Daily Driver" stack?
          content: |
            For production, I lean on Laravel 11 (Octane), Nuxt 3, and PostgreSQL. For AI and Data pipelines, I use Python (FastAPI/LangChain) and Vector Databases like Pinecone. My infrastructure is managed via Docker and GitHub Actions, with a strong focus on Redis for caching and real-time state management.