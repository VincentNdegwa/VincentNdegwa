faq:
  title: Frequently Asked Questions
  description: Answers to common questions about how I work and what I build.
  categories:
    - title: Services & Stack
      questions:
        - label: What kind of projects do you take on?
          content: |
            I build full-stack web applications — from RESTful APIs and admin dashboards to SaaS platforms and internal tooling. My core stack is Laravel (PHP) and Django (Python) on the backend, with Vue.js/Nuxt on the frontend. I also work on data pipelines, AI integration (OpenAI, LangChain), and DevOps (Docker, GitHub Actions, DigitalOcean/GCP).
        - label: Can you work on an existing codebase?
          content: |
            Yes — in fact a large portion of my work involves jumping into established codebases, refactoring legacy code, improving performance, and adding new features without breaking what already works. I always start with a brief audit before scoping the work.
        - label: Do you work with early-stage startups?
          content: |
            Absolutely. I enjoy early-stage projects where architectural decisions still matter. I can move fast without sacrificing code quality, and I'm comfortable wearing multiple hats — backend, frontend, infra — when the team is small.
    - title: Pricing & Timelines
      questions:
        - label: How do you charge for work?
          content: |
            I work on a fixed-scope basis for well-defined projects, and on a time-and-materials retainer for ongoing work. Fixed projects start from $3,000. My day rate for consulting or embedded engineering is $500. I always provide a detailed estimate before starting.
        - label: What are your payment terms?
          content: |
            For fixed-scope projects I require a 50% deposit upfront and the remaining 50% on delivery. For retainers, I invoice monthly in advance. I accept payments via bank transfer, Wise, or Stripe.
        - label: How long does a typical project take?
          content: |
            A focused API or dashboard typically takes 2–4 weeks. A full SaaS MVP with auth, billing, and deployment can take 6–12 weeks depending on complexity. I share a milestone-based timeline before we begin.
        - label: Do you offer post-launch support?
          content: |
            Yes. I offer a 30-day warranty period on all fixed-scope projects, and ongoing support retainers for teams that need a reliable engineer on-call for bug fixes, performance tuning, and new features.
    - title: About Me
      questions:
        - label: What's your educational background?
          content: |
            BSc in Software Engineering from Kirinyaga University, and an MSc in Artificial Intelligence (specialising in Applied ML & Intelligent Automation) from the Open University of Kenya. The combination gives me deep software architecture foundations alongside hands-on machine learning research.
        - label: What do you geek out about outside of work?
          content: |
            Open-source tooling, local LLM experiments with Ollama, competitive programming, and football. I also write technical articles to solidify and share what I'm learning.
