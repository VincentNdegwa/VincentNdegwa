title: About Me
description: Full-stack engineer and AI engineer available for remote work. I build high-availability ERPs, FinTech platforms, and AI-powered SaaS products that solve real business problems at scale.
content: |
  Hey, I'm **Vincent Ndegwa**, a full-stack software engineer and AI engineer. I've spent the past 4+ years building production systems that real businesses depend on — from multi-tenant ERP platforms at Paysoko to open-source SaaS tools used by creators and enterprises globally.

  My backend home is **Laravel** and **Django**. My frontend of choice is **Vue.js and Nuxt 3**. I'm equally comfortable tuning MySQL query plans, wiring up WebSocket real-time pipelines with Laravel Reverb, or deploying containerised services to DigitalOcean and GCP.

  ### The AI Thread

  I'm currently completing an **MSc in Artificial Intelligence** at the Open University of Kenya, specialising in Applied Machine Learning and Intelligent Automation. This isn't just academic — I've shipped a real NLP-powered sentiment analysis engine (Telliqo) and a collaborative filtering recommendation system for a retail client. My goal is to make AI a practical layer inside enterprise software, not a standalone demo.

  ### Engineering Philosophy

  I believe in **clean architecture first**: service layers, repository patterns, proper test coverage. A system that's fast but impossible to change is a liability. I write code that the next engineer — or future-me — can understand and extend without fear.

  I take DevOps seriously too. Every project I ship has a **CI/CD pipeline** (GitHub Actions), Docker containerisation, and zero-downtime deployment strategies. Infrastructure is part of the product.

  ### Education

  - **MSc Artificial Intelligence** — Open University of Kenya *(in progress)*
  - **BSc Software Engineering** — Kirinyaga University

  ### Beyond the Terminal

  When I'm not in a codebase, I'm experimenting with local LLMs via Ollama, following football, or writing technical articles to crystallise what I've learned.

  Browse my [projects](/projects) or [get in touch](mailto:ndegwavincent7@gmail.com) — I'm always open to interesting problems.
